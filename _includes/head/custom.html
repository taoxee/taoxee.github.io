<!-- Performance Optimizations -->
<meta name="theme-color" content="#007AFF">

<!-- Apple-inspired Typography -->
<style>
  /* Import San Francisco-like fonts */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  
  /* Smooth scrolling and momentum */
  html {
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  
  /* Apple-like focus states */
  button:focus,
  input:focus,
  textarea:focus,
  select:focus {
    outline: 2px solid #007AFF;
    outline-offset: 2px;
  }
  
  /* Enhanced touch targets for mobile */
  @media (max-width: 768px) {
    button,
    .btn,
    a[role="button"] {
      min-height: 44px;
      min-width: 44px;
    }
  }

  /* ── Sidebar collapse toggle ──────────────────────────────────────── */

  /* Full-width button at the top of the sidebar; no background, just border */
  .sidebar__toggle {
    display: block;
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid #e8e8e8;
    padding: 0.35rem 0;
    margin-bottom: 0.75rem;
    /* Arrow sits on the right so it reads as "collapse ←" */
    text-align: right;
    cursor: pointer;
    color: #9aa0a6;
    transition: color 0.2s;
    line-height: 1;
  }
  .sidebar__toggle:hover { color: #007AFF; }
  /* Override the global Apple focus style for this button only */
  .sidebar__toggle:focus { outline: 2px solid #007AFF; outline-offset: 2px; }

  /* Rotate chevron 180° (now points right = "expand →") when collapsed */
  .sidebar--collapsed .sidebar__toggle-icon {
    transform: rotate(180deg);
    transition: transform 0.2s ease;
  }
  /* Smooth rotation back when expanded */
  .sidebar__toggle-icon {
    transition: transform 0.2s ease;
    display: inline-block;
    vertical-align: middle;
  }

  /* Hide the author/nav content when collapsed; the toggle button stays visible */
  .sidebar--collapsed .sidebar__inner {
    display: none;
  }

  /* ── SVG icon alignment (replaces emoji in .icon spans) ───────────── */
  /* Vertically center SVGs so they sit on the same baseline as heading text */
  .icon svg {
    display: inline-block;
    vertical-align: middle;
    position: relative;
    top: -0.08em;
    margin-right: 0.15em;
  }
  /* Contact card icon: center the SVG inside its container div */
  .contact-card__icon svg {
    display: block;
    margin: 0 auto;
  }

  /* ── WeChat ID copy button ─────────────────────────────────────────── */
  /* Strip button chrome so it blends with the contact-card__link style */
  .wechat-id-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    font: inherit;
    padding: 0;
    text-decoration: none;
  }
  .wechat-id-btn:hover .wechat-id-btn__text {
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  /* Tooltip bubble — hidden until hover */
  .wechat-id-btn__tooltip {
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 500;
    white-space: nowrap;
    padding: 0.25rem 0.65rem;
    border-radius: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    letter-spacing: 0.01em;
  }
  /* Downward arrow on tooltip */
  .wechat-id-btn__tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: #1a1a1a;
  }
  /* Show tooltip on hover */
  .wechat-id-btn:hover .wechat-id-btn__tooltip {
    opacity: 1;
  }
  /* "Copied!" state — green tint */
  .wechat-id-btn.copied .wechat-id-btn__tooltip {
    background: #22863a;
    opacity: 1;
  }
  .wechat-id-btn.copied .wechat-id-btn__tooltip::after {
    border-top-color: #22863a;
  }

  /* ── Sidebar collapse: layout reflow ──────────────────────────────── */
  /* MM theme floats .sidebar left at a fixed px width, then floats        */
  /* .page / .archive right with calc(100% - sidebar-width). We override   */
  /* those widths when the sidebar is collapsed so content fills the gap.  */

  /* [$large = 1024px] sidebar is 200px, content is calc(100% - 200px) */
  @media (min-width: 1024px) {
    /* Animate sidebar width and content width together */
    .sidebar.sticky {
      transition: width 0.25s ease;
    }

    /* Collapsed sidebar: shrink to a thin strip (just the arrow button) */
    .sidebar--collapsed {
      width: 2rem !important;
    }

    /* Center arrow in the narrow collapsed strip; drop the divider line */
    .sidebar--collapsed .sidebar__toggle {
      text-align: center;
      border-bottom: none;
      margin-bottom: 0;
    }

    /* Transition the sibling content elements back/forth smoothly */
    #author-sidebar ~ article.page,
    #author-sidebar ~ div.archive {
      transition: width 0.25s ease, padding-right 0.25s ease;
    }

    /* Expand content to fill the freed sidebar space */
    #author-sidebar.sidebar--collapsed ~ article.page,
    #author-sidebar.sidebar--collapsed ~ div.archive {
      width: calc(100% - 2rem) !important;
      padding-right: 0 !important;
    }
  }

  /* [$x-large = 1280px] sidebar is 300px, content is calc(100% - 300px) */
  @media (min-width: 1280px) {
    /* Same collapsed width override applies at wider breakpoint */
    .sidebar--collapsed {
      width: 2rem !important;
    }

    /* Same content expansion at wider breakpoint */
    #author-sidebar.sidebar--collapsed ~ article.page,
    #author-sidebar.sidebar--collapsed ~ div.archive {
      width: calc(100% - 2rem) !important;
      padding-right: 0 !important;
    }
  }
</style>
